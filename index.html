<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股分析工具</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e0dfd8;
  --accent: #2a2a2a;
  --green: #1a7a4a;
  --green-bg: #e8f5ee;
  --red: #c0392b;
  --red-bg: #fdecea;
  --yellow: #b7860b;
  --yellow-bg: #fef9e7;
  --purple: #6c3fc5;
  --purple-bg: #f0ebff;
  --blue: #1a5fa8;
  --blue-bg: #e8f0fb;
  --text: #1a1a1a;
  --text2: #555550;
  --text3: #999990;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* Header */
.header {
  background: var(--accent);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--mono); font-size: 12px; color: #fff; letter-spacing: 0.12em; }
.logo span { color: #aaa; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.clock { font-family: var(--mono); font-size: 11px; color: #aaa; }

/* Search area */
.search-area { background: var(--accent); padding: 0 1.5rem 1.25rem; }
.watchlist { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.wl-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px; color: #ccc; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
}
.wl-btn:hover, .wl-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.5); }
.search-row { display: flex; gap: 8px; }
.search-row input {
  flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 5px; padding: 9px 14px; font-family: var(--mono); font-size: 14px;
  color: #fff; text-transform: uppercase; outline: none; transition: border-color 0.15s;
}
.search-row input:focus { border-color: rgba(255,255,255,0.6); }
.search-row input::placeholder { color: rgba(255,255,255,0.3); text-transform: none; }
.search-btn {
  background: #fff; border: none; border-radius: 5px; padding: 9px 20px;
  font-family: var(--mono); font-size: 12px; color: var(--accent); cursor: pointer;
  font-weight: 700; letter-spacing: 0.05em; transition: opacity 0.15s;
}
.search-btn:hover { opacity: 0.85; }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Main */
.main { max-width: 780px; margin: 0 auto; padding: 1.5rem; }

/* Loading / Error */
.loading {
  text-align: center; padding: 4rem 0; color: var(--text3);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  margin: 1rem auto 0; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  background: var(--red-bg); border: 1px solid #f5c6c2;
  border-radius: 8px; padding: 1rem; color: var(--red); font-size: 13px;
}

/* Page nav */
.page-nav {
  display: flex; gap: 4px; margin-bottom: 1.25rem;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.page-tab {
  font-family: var(--mono); font-size: 11px; padding: 8px 16px;
  border: none; background: none; cursor: pointer; color: var(--text3);
  letter-spacing: 0.06em; border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.15s;
}
.page-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.page-tab:hover { color: var(--text); }

/* Page content */
.page { display: none; animation: fadeIn 0.25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Report header */
.report-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
  display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;
}
.rh-left h1 { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: 0.04em; }
.rh-left p { font-size: 13px; color: var(--text2); margin-top: 2px; }
.rh-meta { text-align: right; }
.rh-meta .exchange { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; }
.rh-meta .industry { font-size: 12px; color: var(--text2); margin-top: 3px; }

.price-section { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.price-big { font-family: var(--mono); font-size: 36px; font-weight: 700; }
.price-change { font-family: var(--mono); font-size: 15px; }
.pos { color: var(--green); } .neg { color: var(--red); }

/* Score gauge */
.score-row { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
.score-box {
  flex: 1; min-width: 120px; background: var(--surface2);
  border-radius: 8px; padding: 0.875rem; text-align: center;
}
.score-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; margin-bottom: 6px; }
.score-num { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
.score-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.score-A { color: var(--green); } .score-B { color: var(--blue); }
.score-C { color: var(--yellow); } .score-D { color: var(--red); }

/* Section */
.section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
}
.section-title {
  font-size: 10px; color: var(--text3); font-family: var(--mono);
  letter-spacing: 0.08em; margin-bottom: 1rem;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}

/* Grid metrics */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
.metric-box { background: var(--surface2); border-radius: 6px; padding: 0.75rem; }
.m-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; margin-bottom: 4px; }
.m-value { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); }
.m-sub { font-size: 10px; color: var(--text2); margin-top: 3px; }

/* Multi timeframe */
.tf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tf-box {
  background: var(--surface2); border-radius: 6px; padding: 0.875rem; text-align: center;
  border-top: 3px solid var(--border);
}
.tf-box.bull { border-top-color: var(--green); }
.tf-box.bear { border-top-color: var(--red); }
.tf-box.neutral { border-top-color: var(--yellow); }
.tf-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; margin-bottom: 8px; }
.tf-signal { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.tf-rsi { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.tf-rsi-num { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text); }

/* Tech indicators */
.tech-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
@media(max-width: 500px) { .tech-grid { grid-template-columns: repeat(2, 1fr); } }
.tech-box { background: var(--surface2); border-radius: 6px; padding: 0.75rem; }
.tech-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; margin-bottom: 4px; }
.tech-value { font-family: var(--mono); font-size: 17px; font-weight: 700; }
.tech-signal { font-size: 10px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.dot-green { background: var(--green); } .dot-red { background: var(--red); } .dot-yellow { background: var(--yellow); }

/* RSI bar */
.rsi-bar-wrap { position: relative; height: 6px; border-radius: 3px; background: linear-gradient(to right, var(--green), #f0c040, var(--red)); margin: 8px 0 4px; }
.rsi-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 2px solid #fff; }

/* Support/Resistance */
.sr-bar { position: relative; height: 40px; margin: 1rem 0; }
.sr-line { position: absolute; height: 3px; border-radius: 2px; display: flex; align-items: center; }
.sr-label { font-size: 10px; font-family: var(--mono); font-weight: 700; white-space: nowrap; padding: 0 6px; }
.sr-price { font-size: 11px; font-family: var(--mono); position: absolute; right: 0; top: -14px; }

/* Sentiment */
.sentiment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sentiment-box { background: var(--surface2); border-radius: 6px; padding: 0.875rem; }
.gauge-wrap { display: flex; flex-direction: column; align-items: center; margin: 0.5rem 0; }
.gauge-num { font-family: var(--mono); font-size: 24px; font-weight: 700; }
.gauge-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.sentiment-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-family: var(--mono); }
.sentiment-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 8px; }
.sentiment-bar-fill { height: 4px; border-radius: 2px; background: var(--green); }

/* Analyst */
.analyst-target { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--text); }
.analyst-upside { font-size: 13px; color: var(--green); font-family: var(--mono); margin-left: 8px; }
.rating-bar { height: 8px; border-radius: 4px; display: flex; overflow: hidden; margin: 8px 0; }
.rating-buy { background: var(--green); }
.rating-hold { background: var(--yellow); }
.rating-sell { background: var(--red); }
.rating-legend { display: flex; gap: 12px; font-size: 10px; color: var(--text2); font-family: var(--mono); }
.rating-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }

/* Volume */
.volume-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
@media(max-width:500px) { .volume-grid { grid-template-columns: repeat(2,1fr); } }

/* Strategy cards */
.strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:500px) { .strategy-grid { grid-template-columns: 1fr; } }
.strategy-card {
  border-radius: 8px; padding: 1rem;
  border: 1.5px solid var(--border);
}
.strategy-card.aggressive { border-color: #f5c6c2; background: #fff8f8; }
.strategy-card.conservative { border-color: #c6dff5; background: #f8fbff; }
.strategy-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.strategy-name { font-size: 13px; font-weight: 700; font-family: var(--mono); letter-spacing: 0.04em; }
.buy-badge { background: var(--green); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-weight: 700; }
.strategy-entry { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.04em; margin-bottom: 3px; }
.strategy-price { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; }
.strategy-stop { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 3px; }
.strategy-stop-price { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 0.75rem; }
.targets { display: flex; flex-direction: column; gap: 4px; }
.target-row { display: flex; justify-content: space-between; font-size: 11px; font-family: var(--mono); }
.target-label { color: var(--text3); }
.target-price { color: var(--green); font-weight: 700; }
.rr-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

/* Risk banner */
.risk-banner {
  background: var(--red-bg); border-left: 3px solid var(--red);
  border-radius: 0 8px 8px 0; padding: 1rem; margin-bottom: 1rem;
}
.risk-title { font-size: 12px; font-weight: 700; color: var(--red); font-family: var(--mono); margin-bottom: 6px; letter-spacing: 0.04em; }
.risk-text { font-size: 12px; color: #7a2020; line-height: 1.7; }

/* Summary */
.summary-banner {
  background: var(--surface2); border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0; padding: 1rem;
}
.summary-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.summary-text { font-size: 13px; color: var(--text2); line-height: 1.8; }

/* FRED macro */
.macro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
@media(max-width:500px) { .macro-grid { grid-template-columns: repeat(2,1fr); } }

/* Footer */
.footer { text-align: center; padding: 2rem 1.5rem 3rem; font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.04em; }

/* Zone bar */
.zone-bar-wrap { position: relative; height: 6px; border-radius: 3px; background: linear-gradient(to right, var(--green), #f0c040, var(--red)); margin: 6px 0 4px; }
.zone-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 2px solid #fff; }
.zone-ends { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: var(--mono); }

.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-weight: 700; margin-left: 6px; }
.tag-buy { background: var(--green-bg); color: var(--green); }
.tag-sell { background: var(--red-bg); color: var(--red); }
.tag-neutral { background: var(--surface2); color: var(--text3); }
.tag-bull { background: var(--green-bg); color: var(--green); }
.tag-bear { background: var(--red-bg); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">STOCK<span>/</span>ANALYZER</div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
  </div>
</div>

<div class="search-area">
  <div class="watchlist" id="wl"></div>
  <div class="search-row">
    <input type="text" id="inp" placeholder="輸入股票代碼，例如 MU" maxlength="10"/>
    <button class="search-btn" id="btn" onclick="run()">查詢</button>
  </div>
</div>

<div class="main">
  <div id="out">
    <div style="text-align:center;padding:4rem 0;color:#bbb;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.1em;">
      輸入股票代碼開始分析
    </div>
  </div>
</div>

<div class="footer" id="footer" style="display:none">
  本工具不構成投資建議 ｜ Twelve Data / Finnhub / FINRA / FRED ｜ <span id="report-date"></span>
</div>

<script>
const FK = 'd74eq5pr01qno4q1g9lgd74eq5pr01qno4q1g9m0';
const TDK = '32cab2a16d674bcc982737bed199e298';
const FREDK = '34fac5eb1c60555ef44b9fda3f84136d';
const STOCKS = ['MU','RKLB','GOOGL','NVDA','AAPL','TSLA'];

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock,1000); updateClock();

const wl = document.getElementById('wl');
STOCKS.forEach(s => {
  const b = document.createElement('button');
  b.className='wl-btn'; b.textContent=s;
  b.onclick=()=>{
    document.querySelectorAll('.wl-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('inp').value=s; run();
  };
  wl.appendChild(b);
});
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

function showPage(n) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}

async function run() {
  const t = document.getElementById('inp').value.trim().toUpperCase();
  if (!t) return;
  const out = document.getElementById('out');
  const btn = document.getElementById('btn');
  btn.disabled = true;
  out.innerHTML = '<div class="loading">分析中，請稍候...<div class="spinner"></div></div>';

  try {
    // Fetch all data in parallel
    const [quote, profile, metrics, candles, candles_w, news_sentiment, analyst, finra] = await Promise.all([
      fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FK}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${t}&token=${FK}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${t}&metric=all&token=${FK}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${t}&resolution=D&count=100&token=${FK}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${t}&resolution=W&count=52&token=${FK}`).then(r=>r.json()),
      fetch(`https://finnhub.io/api/v1/news-sentiment?symbol=${t}&token=${FK}`).then(r=>r.json()).catch(()=>({})),
      fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${t}&token=${FK}`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.finra.org/data/group/otcMarket/name/consolidatedShortInterest?limit=1`).then(r=>r.json()).catch(()=>[])
    ]);

    if (!quote || quote.c === 0) {
      out.innerHTML = '<div class="error-msg">找不到此股票代碼，請確認後再試。</div>';
      btn.disabled = false; return;
    }

    // FRED macro data
    let fedRate = null, gdpGrowth = null;
    try {
      const fredResp = await fetch(`https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&api_key=${FREDK}&limit=1&sort_order=desc&file_type=json`);
      const fredData = await fredResp.json();
      if (fredData.observations && fredData.observations.length > 0) fedRate = parseFloat(fredData.observations[0].value);
    } catch(e) {}
    try {
      const gdpResp = await fetch(`https://api.stlouisfed.org/fred/series/observations?series_id=A191RL1Q225SBEA&api_key=${FREDK}&limit=1&sort_order=desc&file_type=json`);
      const gdpData = await gdpResp.json();
      if (gdpData.observations && gdpData.observations.length > 0) gdpGrowth = parseFloat(gdpData.observations[0].value);
    } catch(e) {}

    // Twelve Data MACD
    let macd = null, adx_val = null, bb_upper = null, bb_lower = null, bb_mid = null;
    try {
      const [macdR, adxR, bbR] = await Promise.all([
        fetch(`https://api.twelvedata.com/macd?symbol=${t}&interval=1day&apikey=${TDK}&outputsize=1`).then(r=>r.json()),
        fetch(`https://api.twelvedata.com/adx?symbol=${t}&interval=1day&apikey=${TDK}&outputsize=1`).then(r=>r.json()),
        fetch(`https://api.twelvedata.com/bbands?symbol=${t}&interval=1day&apikey=${TDK}&outputsize=1`).then(r=>r.json())
      ]);
      if (macdR.values && macdR.values[0]) macd = parseFloat(macdR.values[0].macd) - parseFloat(macdR.values[0].macd_signal);
      if (adxR.values && adxR.values[0]) adx_val = parseFloat(adxR.values[0].adx);
      if (bbR.values && bbR.values[0]) {
        bb_upper = parseFloat(bbR.values[0].upper_band);
        bb_lower = parseFloat(bbR.values[0].lower_band);
        bb_mid = parseFloat(bbR.values[0].middle_band);
      }
    } catch(e) {}

    // ===== Calculations =====
    const price = quote.c, chg = quote.c - quote.pc;
    const chgP = ((chg/quote.pc)*100).toFixed(2);
    const isPos = chg >= 0;
    const mx = metrics.metric || {};

    // RSI daily
    let rsi_d = null;
    if (candles && candles.c && candles.c.length >= 15) {
      const cl = candles.c; let g=0,l=0;
      for(let i=cl.length-14;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
      const ag=g/14,al=l/14; rsi_d=al===0?100:Math.round(100-(100/(1+ag/al)));
    }

    // RSI weekly
    let rsi_w = null;
    if (candles_w && candles_w.c && candles_w.c.length >= 15) {
      const cl = candles_w.c; let g=0,l=0;
      for(let i=cl.length-14;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
      const ag=g/14,al=l/14; rsi_w=al===0?100:Math.round(100-(100/(1+ag/al)));
    }

    // RSI monthly (approx from weekly)
    let rsi_m = null;
    if (candles_w && candles_w.c && candles_w.c.length >= 28) {
      const cl = candles_w.c.filter((_,i)=>i%4===0); let g=0,l=0;
      for(let i=Math.max(0,cl.length-14);i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l+=Math.abs(d);}

          <div class="metric-box">
            <div class="m-label">營收成長 YoY</div>
            <div class="m-value ${mx.revenueGrowthTTMYoy&&mx.revenueGrowthTTMYoy>0?'pos':'neg'}">${mx.revenueGrowthTTMYoy?(mx.revenueGrowthTTMYoy*100).toFixed(1)+'%':'—'}</div>
            <div class="m-sub">毛利率 ${mx.grossMarginTTM?mx.grossMarginTTM.toFixed(1)+'%':'—'}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">FRED 總經背景</div>
        <div class="macro-grid">
          <div class="metric-box">
            <div class="m-label">聯邦基金利率</div>
            <div class="m-value">${fedRate!=null?fedRate.toFixed(2)+'%':'—'}</div>
            <div class="m-sub">FEDFUNDS</div>
          </div>
          <div class="metric-box">
            <div class="m-label">GDP 成長率</div>
            <div class="m-value ${gdpGrowth!=null?(gdpGrowth>0?'pos':'neg'):''}">${gdpGrowth!=null?gdpGrowth.toFixed(1)+'%':'—'}</div>
            <div class="m-sub">QoQ 年化</div>
          </div>
          <div class="metric-box">
            <div class="m-label">Beta</div>
            <div class="m-value">${f(mx.beta)}</div>
            <div class="m-sub">市場敏感度</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGE 3 -->
    <div class="page" id="page-3">
      <div class="report-header">
        <div class="rh-left">
          <h1>${t} <span style="font-size:16px;color:var(--text2)">${profile.name||''}</span></h1>
          <div class="price-section" style="margin-top:0.5rem">
            <span class="price-big">$${price.toFixed(2)}</span>
            <span class="price-change ${isPos?'pos':'neg'}">${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${chgP}%)</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">交易策略</div>
        <div class="strategy-grid">
          <div class="strategy-card aggressive">
            <div class="strategy-header">
              <span class="strategy-name" style="color:var(--red)">激進策略</span>
              <span class="buy-badge">BUY</span>
            </div>
            <div class="strategy-entry">入場區間</div>
            <div class="strategy-price">$${aggressive_entry_lo} – $${aggressive_entry_hi}</div>
            <div class="strategy-stop">止損</div>
            <div class="strategy-stop-price">$${aggressive_stop}</div>
            <div class="targets">
              <div class="target-row"><span class="target-label">T1</span><span class="target-price">$${t1}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t1-price)/(price-parseFloat(aggressive_stop))).toFixed(1)}:1</span></div>
              <div class="target-row"><span class="target-label">T2</span><span class="target-price">$${t2}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t2-price)/(price-parseFloat(aggressive_stop))).toFixed(1)}:1</span></div>
              <div class="target-row"><span class="target-label">T3</span><span class="target-price">$${t3}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t3-price)/(price-parseFloat(aggressive_stop))).toFixed(1)}:1</span></div>
            </div>
          </div>
          <div class="strategy-card conservative">
            <div class="strategy-header">
              <span class="strategy-name" style="color:var(--blue)">保守策略</span>
              <span class="buy-badge">BUY</span>
            </div>
            <div class="strategy-entry">入場區間</div>
            <div class="strategy-price">$${conservative_entry_lo} – $${conservative_entry_hi}</div>
            <div class="strategy-stop">止損</div>
            <div class="strategy-stop-price">$${conservative_stop}</div>
            <div class="targets">
              <div class="target-row"><span class="target-label">T1</span><span class="target-price">$${t1}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t1-price)/(price-parseFloat(conservative_stop))).toFixed(1)}:1</span></div>
              <div class="target-row"><span class="target-label">T2</span><span class="target-price">$${t2}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t2-price)/(price-parseFloat(conservative_stop))).toFixed(1)}:1</span></div>
              <div class="target-row"><span class="target-label">T3</span><span class="target-price">$${t3}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">R:R ${((t3-price)/(price-parseFloat(conservative_stop))).toFixed(1)}:1</span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="risk-banner">
        <div class="risk-title">風險提示</div>
        <div class="risk-text">${riskText}</div>
      </div>

      <div class="summary-banner">
        <div class="summary-title">${grade==='A'?'強烈看多，等待回調布局':grade==='B'?'偏多，分批建倉':grade==='C'?'中性觀望，等待訊號確認':'謹慎，暫不追高'}</div>
        <div class="summary-text">${summaryMap[grade]}</div>
        <div style="margin-top:0.75rem;display:flex;gap:6px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">評分構成：</span>
          <span style="font-size:10px;font-family:var(--mono)">技術 ×70%</span>
          <span style="font-size:10px;font-family:var(--mono)">FINRA ×15%</span>
          <span style="font-size:10px;font-family:var(--mono)">情緒 ×15%</span>
        </div>
      </div>
    </div>
    `;

  } catch(e) {
    out.innerHTML = `<div class="error-msg">錯誤：${e.message}</div>`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
