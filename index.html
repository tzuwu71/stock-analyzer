<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股分析工具</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e0dfd8;--accent:#2a2a2a;--green:#1a7a4a;--green-bg:#e8f5ee;--red:#c0392b;--red-bg:#fdecea;--yellow:#b7860b;--purple:#6c3fc5;--purple-bg:#f0ebff;--blue:#1a5fa8;--blue-bg:#e8f0fb;--text:#1a1a1a;--text2:#555550;--text3:#999990;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.header{background:var(--accent);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:12px;color:#fff;letter-spacing:.12em}.logo span{color:#888}
.clock{font-family:var(--mono);font-size:11px;color:#888}
.search-area{background:var(--accent);padding:0 1.5rem 1.25rem}
.watchlist{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.wl-btn{font-family:var(--mono);font-size:11px;padding:4px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:3px;color:#ccc;cursor:pointer;transition:all .15s}
.wl-btn:hover,.wl-btn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.5)}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:9px 14px;font-family:var(--mono);font-size:14px;color:#fff;text-transform:uppercase;outline:none}
.search-row input:focus{border-color:rgba(255,255,255,.6)}
.search-row input::placeholder{color:rgba(255,255,255,.3);text-transform:none}
.search-btn{background:#fff;border:none;border-radius:5px;padding:9px 20px;font-family:var(--mono);font-size:12px;color:var(--accent);cursor:pointer;font-weight:700;letter-spacing:.05em}
.search-btn:disabled{opacity:.4;cursor:not-allowed}
.main{max-width:780px;margin:0 auto;padding:1.5rem}
.loading{text-align:center;padding:4rem 0;color:var(--text3);font-family:var(--mono);font-size:12px;letter-spacing:.1em}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:1rem auto 0;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:var(--red-bg);border:1px solid #f5c6c2;border-radius:8px;padding:1rem;color:var(--red);font-size:13px}
.page-nav{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border)}
.page-tab{font-family:var(--mono);font-size:11px;padding:8px 16px;border:none;background:none;cursor:pointer;color:var(--text3);letter-spacing:.06em;border-bottom:2px solid transparent;margin-bottom:-1px}
.page-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;animation:fi .25s ease}.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rpt-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem}
.rh-l h1{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:.04em}
.rh-l p{font-size:13px;color:var(--text2);margin-top:2px}
.rh-r{text-align:right}
.price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-top:.75rem}
.pbig{font-family:var(--mono);font-size:34px;font-weight:700}
.pchg{font-family:var(--mono);font-size:14px}
.pos{color:var(--green)}.neg{color:var(--red)}
.score-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sbox{flex:1;min-width:110px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.875rem;text-align:center}
.slbl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;margin-bottom:6px}
.snum{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
.ssub{font-size:10px;color:var(--text2);margin-top:4px}
.gA{color:var(--green)}.gB{color:var(--blue)}.gC{color:var(--yellow)}.gD{color:var(--red)}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.stitle{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.mbox{background:var(--surface2);border-radius:6px;padding:.75rem}
.mlbl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;margin-bottom:4px}
.mval{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--text)}
.msub{font-size:10px;color:var(--text2);margin-top:3px}
.tfgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tfbox{background:var(--surface2);border-radius:6px;padding:.875rem;text-align:center;border-top:3px solid var(--border)}
.tfbox.bull{border-top-color:var(--green)}.tfbox.bear{border-top-color:var(--red)}.tfbox.neutral{border-top-color:var(--yellow)}
.tfp{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;margin-bottom:8px}
.tfs{font-size:15px;font-weight:700;margin-bottom:6px}
.tfrl{font-size:10px;color:var(--text3);font-family:var(--mono)}
.tfrn{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}
.techgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:500px){.techgrid{grid-template-columns:repeat(2,1fr)}}
.techbox{background:var(--surface2);border-radius:6px;padding:.75rem}
.techlbl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;margin-bottom:4px}
.techval{font-family:var(--mono);font-size:17px;font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dg{background:var(--green)}.dr{background:var(--red)}.dy{background:var(--yellow)}
.rsibar{position:relative;height:6px;border-radius:3px;background:linear-gradient(to right,var(--green),#f0c040,var(--red));margin:8px 0 4px}
.rsidot{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:var(--accent);border-radius:50%;border:2px solid #fff}
.zonebar{position:relative;height:6px;border-radius:3px;background:linear-gradient(to right,var(--green),#f0c040,var(--red));margin:6px 0 4px}
.zonedot{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:var(--accent);border-radius:50%;border:2px solid #fff}
.zoneends{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbox2{background:var(--surface2);border-radius:6px;padding:.875rem}
.gnum{font-family:var(--mono);font-size:24px;font-weight:700}
.glbl{font-size:11px;color:var(--text2);margin-top:2px}
.srow{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px;font-family:var(--mono)}
.sbarbg{height:4px;background:var(--border);border-radius:2px;margin-bottom:8px}
.atgt{font-family:var(--mono);font-size:32px;font-weight:700}
.aup{font-size:13px;color:var(--green);font-family:var(--mono);margin-left:8px}
.rbar{height:8px;border-radius:4px;display:flex;overflow:hidden;margin:8px 0}
.rleg{display:flex;gap:12px;font-size:10px;color:var(--text2);font-family:var(--mono)}
.rdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:500px){.vgrid{grid-template-columns:repeat(2,1fr)}}
.macgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.stgrid{grid-template-columns:1fr}}
.stcard{border-radius:8px;padding:1rem;border:1.5px solid var(--border)}
.stcard.ag{border-color:#f5c6c2;background:#fff8f8}
.stcard.co{border-color:#c6dff5;background:#f8fbff}
.sthdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.stnm{font-size:13px;font-weight:700;font-family:var(--mono)}
.bbdg{background:var(--green);color:#fff;font-size:10px;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-weight:700}
.stlb{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.stpr{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:.75rem}
.stsp{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--red);margin-bottom:.75rem}
.trow{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);margin-bottom:4px}
.tl{color:var(--text3)}.tp{color:var(--green);font-weight:700}.tr{color:var(--text3)}
.riskbanner{background:var(--red-bg);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:1rem;margin-bottom:1rem}
.risktitle{font-size:12px;font-weight:700;color:var(--red);font-family:var(--mono);margin-bottom:6px;letter-spacing:.04em}
.risktext{font-size:12px;color:#7a2020;line-height:1.7}
.sumbanner{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:1rem}
.sumtitle{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px}
.sumtext{font-size:13px;color:var(--text2);line-height:1.8}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-weight:700;margin-left:6px}
.tag-buy{background:var(--green-bg);color:var(--green)}
.tag-sell{background:var(--red-bg);color:var(--red)}
.tag-neutral{background:var(--surface2);color:var(--text3)}
.footer{text-align:center;padding:2rem 1.5rem 3rem;font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.04em}
</style>
</head>
<body>
<div class="header">
  <div class="logo">STOCK<span>/</span>ANALYZER</div>
  <div class="clock" id="clock"></div>
</div>
<div class="search-area">
  <div class="watchlist" id="wl"></div>
  <div class="search-row">
    <input type="text" id="inp" placeholder="輸入股票代碼，例如 MU" maxlength="10"/>
    <button class="search-btn" id="btn" onclick="run()">查詢</button>
  </div>
</div>
<div class="main">
  <div id="out" style="text-align:center;padding:4rem 0;color:#bbb;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em">輸入股票代碼開始分析</div>
</div>
<div class="footer" id="footer" style="display:none">本工具不構成投資建議 ｜ Twelve Data / Finnhub / FRED ｜ <span id="rdate"></span></div>

<script>
const FK='d74eq5pr01qno4q1g9lgd74eq5pr01qno4q1g9m0';
const TDK='32cab2a16d674bcc982737bed199e298';
const FREDK='34fac5eb1c60555ef44b9fda3f84136d';
const STOCKS=['MU','RKLB','GOOGL','NVDA','AAPL','TSLA'];

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

const wlEl=document.getElementById('wl');
STOCKS.forEach(s=>{
  const b=document.createElement('button');b.className='wl-btn';b.textContent=s;
  b.onclick=()=>{document.querySelectorAll('.wl-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('inp').value=s;run();};
  wlEl.appendChild(b);
});
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  document.getElementById('t'+n).classList.add('active');
}

async function sf(url){try{const r=await fetch(url);return r.ok?r.json():null;}catch(e){return null;}}

async function run(){
  const t=document.getElementById('inp').value.trim().toUpperCase();
  if(!t)return;
  const out=document.getElementById('out'),btn=document.getElementById('btn');
  btn.disabled=true;
  out.innerHTML='<div class="loading">分析中，請稍候...<div class="spinner"></div></div>';

  try{
    // Parallel fetch all
    const [quote,profile,metricsR,analyst,newsSent,
           rsiDR,rsiWR,rsiMR,macdR,adxR,bbR,tdDaily,
           fredFF,fredGDP]=await Promise.all([
      sf(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FK}`),
      sf(`https://finnhub.io/api/v1/stock/profile2?symbol=${t}&token=${FK}`),
      sf(`https://finnhub.io/api/v1/stock/metric?symbol=${t}&metric=all&token=${FK}`),
      sf(`https://finnhub.io/api/v1/stock/recommendation?symbol=${t}&token=${FK}`),
      sf(`https://finnhub.io/api/v1/news-sentiment?symbol=${t}&token=${FK}`),
      sf(`https://api.twelvedata.com/rsi?symbol=${t}&interval=1day&time_period=14&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/rsi?symbol=${t}&interval=1week&time_period=14&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/rsi?symbol=${t}&interval=1month&time_period=14&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/macd?symbol=${t}&interval=1day&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/adx?symbol=${t}&interval=1day&time_period=14&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/bbands?symbol=${t}&interval=1day&outputsize=1&apikey=${TDK}`),
      sf(`https://api.twelvedata.com/time_series?symbol=${t}&interval=1day&outputsize=10&apikey=${TDK}`),
      sf(`https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&api_key=${FREDK}&limit=1&sort_order=desc&file_type=json`),
      sf(`https://api.stlouisfed.org/fred/series/observations?series_id=A191RL1Q225SBEA&api_key=${FREDK}&limit=1&sort_order=desc&file_type=json`)
    ]);

    if(!quote||quote.c===0){out.innerHTML='<div class="error-msg">找不到此股票代碼，請確認後再試。</div>';btn.disabled=false;return;}

    const price=quote.c,chg=quote.c-quote.pc,chgP=((chg/quote.pc)*100).toFixed(2),isPos=chg>=0;
    const mx=metricsR?.metric||{};

    // Twelve Data indicators
    const rsi_d=rsiDR?.values?.[0]?.value?Math.round(parseFloat(rsiDR.values[0].value)):null;
    const rsi_w=rsiWR?.values?.[0]?.value?Math.round(parseFloat(rsiWR.values[0].value)):null;
    const rsi_m=rsiMR?.values?.[0]?.value?Math.round(parseFloat(rsiMR.values[0].value)):null;
    const macd_h=macdR?.values?.[0]?parseFloat(macdR.values[0].macd)-parseFloat(macdR.values[0].macd_signal):null;
    const adx_v=adxR?.values?.[0]?.adx?parseFloat(adxR.values[0].adx):null;
    const bb_u=bbR?.values?.[0]?.upper_band?parseFloat(bbR.values[0].upper_band):null;
    const bb_l=bbR?.values?.[0]?.lower_band?parseFloat(bbR.values[0].lower_band):null;
    const bb_m=bbR?.values?.[0]?.middle_band?parseFloat(bbR.values[0].middle_band):null;

    // FRED
    const fedRate=fredFF?.observations?.[0]?.value?parseFloat(fredFF.observations[0].value):null;
    const gdpGrowth=fredGDP?.observations?.[0]?.value?parseFloat(fredGDP.observations[0].value):null;

    // 52w
    const hi52=mx['52WeekHigh'],lo52=mx['52WeekLow'];
    let zonePct=50;
    if(hi52&&lo52)zonePct=Math.min(100,Math.max(0,Math.round(((price-lo52)/(hi52-lo52))*100)));

    // Support/resistance from TD daily
    let sup1=null,sup2=null,res1=null;
    if(tdDaily?.values?.length>=5){
      const v=tdDaily.values;
      const highs=v.slice(0,5).map(x=>parseFloat(x.high));
      const lows=v.slice(0,5).map(x=>parseFloat(x.low));
      const pivot=(Math.max(...highs)+Math.min(...lows)+parseFloat(v[0].close))/3;
      res1=(2*pivot-Math.min(...lows)).toFixed(2);
      sup1=(2*pivot-Math.max(...highs)).toFixed(2);
      sup2=(pivot-(Math.max(...highs)-Math.min(...lows))).toFixed(2);
    }

    // Short interest
    const shortDays=mx.daysToCoverShort?mx.daysToCoverShort.toFixed(1):null;
    const shortRatio=mx.shortInterestPercentOfFloat?mx.shortInterestPercentOfFloat.toFixed(1):null;

    // Analyst
    const rec=Array.isArray(analyst)&&analyst.length>0?analyst[0]:null;
    const aBuy=rec?rec.strongBuy+rec.buy:0,aHold=rec?rec.hold:0,aSell=rec?rec.sell+rec.strongSell:0;
    const aTotal=aBuy+aHold+aSell;
    const buyPct=aTotal>0?Math.round(aBuy/aTotal*100):0;
    const holdPct=aTotal>0?Math.round(aHold/aTotal*100):0;
    const sellPct=aTotal>0?Math.round(aSell/aTotal*100):0;
    const analystTarget=mx.targetMedianPrice||mx.targetMeanPrice||null;
    const upside=analystTarget?((analystTarget-price)/price*100).toFixed(1):null;
    const recSig=buyPct>=60?'Buy':buyPct>=40?'Hold':'Sell';

    // Sentiment
    const bull_pct=newsSent?.sentiment?.bullishPercent?Math.round(newsSent.sentiment.bullishPercent*100):50;
    const news_sc=newsSent?.sentiment?.bullishPercent?newsSent.sentiment.bullishPercent.toFixed(2):'0.50';

    // Volume
    const avgVol=mx.averageDailyVolumeOneMonth,curVol=quote.v||0;
    const relVol=avgVol&&curVol?(curVol/avgVol).toFixed(2):null;

    // BB position
    let bbPos='中區';
    if(bb_u&&bb_l&&bb_m){if(price>bb_m+(bb_u-bb_m)*.5)bbPos='上半區';else if(price<bb_m-(bb_m-bb_l)*.5)bbPos='下半區';}

    // Signals
    const tfSig=(r,m)=>r==null?'中性':r<40&&(m==null||m<0)?'看空':r>55&&(m==null||m>0)?'看多':'中性';
    const tfD=tfSig(rsi_d,macd_h),tfW=tfSig(rsi_w,null),tfM=tfSig(rsi_m,null);
    const tfCls=s=>s==='看多'?'bull':s==='看空'?'bear':'neutral';
    const tfArr=s=>s==='看多'?'↑':s==='看空'?'↓':'→';
    const tfClr=s=>s==='看多'?'var(--green)':s==='看空'?'var(--red)':'var(--yellow)';

    // Score
    let tp=0;
    if(rsi_d!=null){if(rsi_d>=40&&rsi_d<=65)tp+=25;else if(rsi_d<35)tp+=18;else tp+=8;}
    if(macd_h!=null){if(macd_h>0)tp+=20;else tp+=5;}
    if(zonePct>60)tp+=15;else if(zonePct>40)tp+=8;
    if(adx_v!=null&&adx_v>25)tp+=15;else if(adx_v!=null)tp+=8;
    if(bbPos==='上半區')tp+=10;else if(bbPos==='中區')tp+=6;
    const techScore=Math.min(100,tp);
    let finraScore=55;if(shortDays!=null){const sd=parseFloat(shortDays);finraScore=sd<3?80:sd<5?65:sd<8?45:25;}
    const totalScore=Math.round(techScore*.70+finraScore*.15+bull_pct*.15);
    const grade=totalScore>=75?'A':totalScore>=60?'B':totalScore>=45?'C':'D';

    // Strategies
    const eAH=(price*.985).toFixed(2),eAL=(price*.945).toFixed(2),sA=(price*.91).toFixed(2);
    const eCH=(price*.945).toFixed(2),eCL=(price*.885).toFixed(2),sC=(price*.855).toFixed(2);
    const t1=analystTarget?(analystTarget*.80+price*.20).toFixed(2):(price*1.12).toFixed(2);
    const t2=analystTarget?(analystTarget*.92).toFixed(2):(price*1.20).toFixed(2);
    const t3=analystTarget?analystTarget.toFixed(2):(price*1.30).toFixed(2);
    const rA1=((t1-price)/(price-parseFloat(sA))).toFixed(1);
    const rA2=((t2-price)/(price-parseFloat(sA))).toFixed(1);
    const rA3=((t3-price)/(price-parseFloat(sA))).toFixed(1);
    const rC1=((t1-price)/(price-parseFloat(sC))).toFixed(1);
    const rC2=((t2-price)/(price-parseFloat(sC))).toFixed(1);
    const rC3=((t3-price)/(price-parseFloat(sC))).toFixed(1);

    const f=v=>v!=null?parseFloat(v).toFixed(2):'—';
    const atr=hi52&&lo52?((hi52-lo52)/52).toFixed(2):(price*.02).toFixed(2);

    const sumMap={
      A:`綜合評分 ${totalScore} 分，技術面與情緒訊號均正面。${analystTarget?`分析師目標價 $${analystTarget.toFixed(2)}，潛在漲幅 ${upside}%，${buyPct}% 分析師買入。`:''} 可積極關注，於支撐區間評估進場。`,
      B:`綜合評分 ${totalScore} 分，多數指標偏多。${analystTarget?`分析師目標價 $${analystTarget.toFixed(2)}，漲幅 ${upside}%。`:''} 建議分批布局，嚴守止損。`,
      C:`綜合評分 ${totalScore} 分，多空訊號分歧。${analystTarget?`分析師目標價 $${analystTarget.toFixed(2)}。`:''} 謹慎評估，等待明確方向。`,
      D:`綜合評分 ${totalScore} 分，多項指標未達標，風險偏高。建議持續觀察，等待改善。`
    };
    const sumTitle=grade==='A'?'強烈看多，等待回調布局':grade==='B'?'偏多，分批建倉':grade==='C'?'中性觀望，等待訊號確認':'謹慎，暫不追高';
    const riskText=`日線RSI ${rsi_d||'—'}${rsi_d&&rsi_d>65?' 超買區，短期回調風險上升。':rsi_d&&rsi_d<35?' 超賣區，反彈機率上升。':' 中性區間。'}${macd_h!=null?` MACD ${macd_h.toFixed(3)}，${macd_h>0?'多頭':'空頭'}動量。`:''}${shortDays?` 做空壓力 ${shortDays} 天。`:''} ATR≈$${atr}，嚴格執行止損。`;

    document.getElementById('rdate').textContent=new Date().toLocaleDateString('zh-TW');
    document.getElementById('footer').style.display='block';

    out.innerHTML=`
    <div class="page-nav">
      <button class="page-tab active" id="t1" onclick="showPage(1)">第1頁 技術分析</button>
      <button class="page-tab" id="t2" onclick="showPage(2)">第2頁 市場情緒</button>
      <button class="page-tab" id="t3" onclick="showPage(3)">第3頁 交易策略</button>
    </div>

    <!-- P1 -->
    <div class="page active" id="p1">
      <div class="rpt-header">
        <div class="rh-l"><h1>${t}</h1><p>${profile?.name||'—'}</p>
          <div class="price-row"><span class="pbig">$${price.toFixed(2)}</span><span class="pchg ${isPos?'pos':'neg'}">${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${chgP}%)</span></div>
        </div>
        <div class="rh-r">
          <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${profile?.exchange||'—'} · ${profile?.currency||'USD'}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">${profile?.finnhubIndustry||'—'}</div>
          <div style="margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--text3)">評分 <span style="font-size:16px;font-weight:700;color:${grade==='A'?'var(--green)':grade==='B'?'var(--blue)':grade==='C'?'var(--yellow)':'var(--red)'}">${totalScore}</span>/100</div>
        </div>
      </div>

      <div class="score-row">
        <div class="sbox"><div class="slbl">綜合評分</div><div class="snum g${grade}">${totalScore}</div><div class="ssub">/ 100</div></div>
        <div class="sbox"><div class="slbl">評級</div><div class="snum g${grade}">${grade}</div><div class="ssub">${grade==='A'?'強烈看多':grade==='B'?'偏多':grade==='C'?'中性':'偏空'}</div></div>
        <div class="sbox"><div class="slbl">做空壓力</div><div class="snum">${shortDays||'—'}</div><div class="ssub">天 DTC</div></div>
        <div class="sbox"><div class="slbl">做空量比</div><div class="snum">${shortRatio||'—'}</div><div class="ssub">% float</div></div>
      </div>

      <div class="sec">
        <div class="stitle">FINRA 市場風險</div>
        <div class="mgrid">
          <div class="mbox"><div class="mlbl">做空壓力天數</div><div class="mval">${shortDays||'—'}<span style="font-size:11px;font-weight:400"> 天</span></div><div class="msub">Days to Cover</div></div>
          <div class="mbox"><div class="mlbl">做空量比</div><div class="mval">${shortRatio||'—'}<span style="font-size:11px;font-weight:400">%</span></div><div class="msub">Float Short</div></div>
          <div class="mbox"><div class="mlbl">市值</div><div class="mval">${mx.marketCapitalization?(mx.marketCapitalization/1000).toFixed(1)+'B':'—'}</div><div class="msub">Beta ${f(mx.beta)}</div></div>
          <div class="mbox"><div class="mlbl">52週位置</div><div class="mval">${zonePct}<span style="font-size:11px;font-weight:400">%</span></div><div class="msub">$${f(lo52)}–$${f(hi52)}</div></div>
        </div>
        <div style="margin-top:1rem">
          <div class="mlbl" style="margin-bottom:6px">52週價格位置</div>
          <div class="zonebar"><div class="zonedot" style="left:${zonePct}%"></div></div>
          <div class="zoneends"><span>低 $${f(lo52)}</span><span>${zonePct}%</span><span>高 $${f(hi52)}</span></div>
        </div>
      </div>

      <div class="sec">
        <div class="stitle">多時間框架</div>
        <div class="tfgrid">
          ${[['日線',rsi_d,tfD],['週線',rsi_w,tfW],['月線',rsi_m,tfM]].map(([lbl,rsi,sig])=>`
          <div class="tfbox ${tfCls(sig)}">
            <div class="tfp">${lbl}</div>
            <div class="tfs" style="color:${tfClr(sig)}">${tfArr(sig)} ${sig}</div>
            <div class="tfrl">RSI ${rsi||'—'}</div>
            <div class="tfrn">${rsi||'—'}</div>
          </div>`).join('')}
        </div>
      </div>

      <div class="sec">
        <div class="stitle">技術指標（日線）</div>
        <div class="techgrid">
          <div class="techbox">
            <div class="techlbl">RSI</div>
            <div class="techval">${rsi_d||'—'}</div>
            ${rsi_d!=null?`<div class="rsibar"><div class="rsidot" style="left:${rsi_d}%"></div></div>`:'<div style="height:6px;margin:8px 0 4px"></div>'}
            <div style="display:flex;align-items:center;gap:4px"><span class="dot ${rsi_d&&rsi_d<35?'dg':rsi_d&&rsi_d>65?'dr':'dy'}"></span><span style="font-size:10px;color:var(--text2)">${rsi_d&&rsi_d<35?'超賣':rsi_d&&rsi_d>65?'超買':'中性'}</span></div>
          </div>
          <div class="techbox">
            <div class="techlbl">MACD</div>
            <div class="techval ${macd_h!=null?(macd_h>0?'pos':'neg'):''}">${macd_h!=null?macd_h.toFixed(3):'—'}</div>
            <div style="height:22px;margin:8px 0 4px"></div>
            <div style="display:flex;align-items:center;gap:4px"><span class="dot ${macd_h!=null?(macd_h>0?'dg':'dr'):'dy'}"></span><span style="font-size:10px;color:var(--text2)">${macd_h!=null?(macd_h>0?'多頭':'空頭'):'—'}</span></div>
          </div>
          <div class="techbox">
            <div class="techlbl">ADX</div>
            <div class="techval">${adx_v!=null?adx_v.toFixed(1):'—'}</div>
            <div style="height:22px;margin:8px 0 4px"></div>
            <div style="display:flex;align-items:center;gap:4px"><span class="dot ${adx_v!=null&&adx_v>25?'dg':'dy'}"></span><span style="font-size:10px;color:var(--text2)">${adx_v!=null?(adx_v>35?'強趨勢':adx_v>25?'趨勢中':'盤整'):'—'}</span></div>
          </div>
          <div class="techbox">
            <div class="techlbl">布林帶</div>
            <div class="techval" style="font-size:14px">${bbPos}</div>
            <div style="height:22px;margin:8px 0 4px"></div>
            <div style="display:flex;align-items:center;gap:4px"><span class="dot ${bbPos==='上半區'?'dg':bbPos==='下半區'?'dr':'dy'}"></span><span style="font-size:10px;color:var(--text2)">${bbPos==='上半區'?'偏強':bbPos==='下半區'?'偏弱':'中性'}</span></div>
          </div>
        </div>
        <div style="margin-top:.75rem;font-size:10px;color:var(--text3);font-family:var(--mono)">今日 $${f(quote.l)}–$${f(quote.h)} ｜ 開盤 $${f(quote.o)} ｜ 前收 $${f(quote.pc)}</div>
      </div>
    </div>

    <!-- P2 -->
    <div class="page" id="p2">
      <div class="rpt-header">
        <div class="rh-l"><h1>${t} <span style="font-size:15px;color:var(--text2);font-weight:400">${profile?.name||''}</span></h1>
          <div class="price-row"><span class="pbig">$${price.toFixed(2)}</span><span class="pchg ${isPos?'pos':'neg'}">${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${chgP}%)</span></div>
        </div>
      </div>

      ${res1&&sup1?`<div class="sec"><div class="stitle">支撐 / 阻力位</div>
        ${[{l:'阻力',v:res1,c:'var(--red)',bg:'var(--red-bg)',s:1},{l:'現價',v:price.toFixed(2),c:'var(--purple)',bg:'var(--purple-bg)',s:0},{l:'支撐',v:sup1,c:'var(--green)',bg:'var(--green-bg)',s:-1},{l:'支撐2',v:sup2,c:'var(--green)',bg:'var(--green-bg)',s:-1}]
          .filter(x=>x.l==='現價'||(x.s>0&&parseFloat(x.v)>price)||(x.s<0&&parseFloat(x.v)<price))
          .map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:${x.bg};border-radius:5px;margin-bottom:6px">
            <span style="font-size:11px;color:${x.c};font-family:var(--mono);font-weight:700">${x.l}</span>
            <span style="font-size:17px;font-family:var(--mono);font-weight:700;color:${x.c}">$${parseFloat(x.v).toFixed(2)}</span>
            <span style="font-size:10px;color:${x.c}">${x.l==='現價'?'—':(((parseFloat(x.v)-price)/price)*100).toFixed(1)+'%'}</span>
          </div>`).join('')}
      </div>`:'' }

      <div class="sec"><div class="stitle">市場情緒</div>
        <div class="sgrid">
          <div class="sbox2">
            <div class="mlbl">新聞情緒</div>
            <div style="text-align:center;margin:.5rem 0"><div class="gnum ${bull_pct>=55?'pos':bull_pct<45?'neg':''}">${bull_pct}%</div><div class="glbl">看漲</div></div>
            <div class="sbarbg"><div style="height:4px;border-radius:2px;width:${bull_pct}%;background:${bull_pct>=55?'var(--green)':bull_pct<45?'var(--red)':'var(--yellow)'}"></div></div>
            <div class="srow"><span>新聞評分</span><span>${news_sc}</span></div>
            <div class="srow"><span>行業均值</span><span>0.50</span></div>
          </div>
          <div class="sbox2">
            <div class="mlbl">分析師評級</div>
            <div style="text-align:center;margin:.5rem 0"><div class="gnum ${buyPct>=60?'pos':buyPct<40?'neg':''}">${buyPct}%</div><div class="glbl">買入</div></div>
            <div class="sbarbg"><div style="height:4px;border-radius:2px;display:flex;overflow:hidden">
              <div style="width:${buyPct}%;background:var(--green)"></div>
              <div style="width:${holdPct}%;background:var(--yellow)"></div>
              <div style="width:${sellPct}%;background:var(--red)"></div>
            </div></div>
            <div class="srow"><span>買入 ${aBuy}</span><span>持有 ${aHold}</span><span>賣出 ${aSell}</span></div>
          </div>
        </div>
      </div>

      <div class="sec"><div class="stitle">分析師共識</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:.75rem;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">目標價</span>
          <span class="atgt">$${analystTarget?analystTarget.toFixed(2):'—'}</span>
          ${upside?`<span class="aup">+${upside}%</span>`:''}
          ${aTotal>0?`<span class="tag tag-${recSig==='Buy'?'buy':recSig==='Sell'?'sell':'neutral'}">${recSig}</span>`:''}
        </div>
        ${aTotal>0?`<div class="rbar"><div style="width:${buyPct}%;background:var(--green)"></div><div style="width:${holdPct}%;background:var(--yellow)"></div><div style="width:${sellPct}%;background:var(--red)"></div></div>
        <div class="rleg"><span><span class="rdot" style="background:var(--green)"></span>買入 ${buyPct}%</span><span><span class="rdot" style="background:var(--yellow)"></span>持有 ${holdPct}%</span><span><span class="rdot" style="background:var(--red)"></span>賣出 ${sellPct}%</span></div>
        `:'<div style="font-size:12px;color:var(--text3)">暫無分析師數據</div>'}
      </div>

      <div class="sec"><div class="stitle">量價 / 基本面</div>
        <div class="vgrid">
          <div class="mbox"><div class="mlbl">平均成交量</div><div class="mval" style="font-size:14px">${avgVol?(avgVol/1e6).toFixed(1)+'M':'—'}</div></div>
          <div class="mbox"><div class="mlbl">相對成交量</div><div class="mval ${relVol&&relVol>1.2?'pos':relVol&&relVol<0.8?'neg':''}">${relVol||'—'}</div><div class="msub">${relVol&&parseFloat(relVol)>1.2?'放量':relVol&&parseFloat(relVol)<0.8?'縮量':'正常'}</div></div>
          <div class="mbox"><div class="mlbl">P/E 本益比</div><div class="mval">${mx.peNormalizedAnnual?mx.peNormalizedAnnual.toFixed(1):'—'}</div><div class="msub">EPS $${f(mx.epsNormalizedAnnual)}</div></div>
          <div class="mbox"><div class="mlbl">營收成長 YoY</div><div class="mval ${mx.revenueGrowthTTMYoy&&mx.revenueGrowthTTMYoy>0?'pos':'neg'}">${mx.revenueGrowthTTMYoy?(mx.revenueGrowthTTMYoy*100).toFixed(1)+'%':'—'}</div><div class="msub">毛利率 ${mx.grossMarginTTM?mx.grossMarginTTM.toFixed(1)+'%':'—'}</div></div>
        </div>
      </div>

      <div class="sec"><div class="stitle">FRED 總經背景</div>
        <div class="macgrid">
          <div class="mbox"><div class="mlbl">聯邦基金利率</div><div class="mval">${fedRate!=null?fedRate.toFixed(2)+'%':'—'}</div><div class="msub">FEDFUNDS</div></div>
          <div class="mbox"><div class="mlbl">GDP 成長率</div><div class="mval ${gdpGrowth!=null?(gdpGrowth>0?'pos':'neg'):''}">${gdpGrowth!=null?gdpGrowth.toFixed(1)+'%':'—'}</div><div class="msub">QoQ 年化</div></div>
          <div class="mbox"><div class="mlbl">Beta</div><div class="mval">${f(mx.beta)}</div><div class="msub">市場敏感度</div></div>
        </div>
      </div>
    </div>

    <!-- P3 -->
    <div class="page" id="p3">
      <div class="rpt-header">
        <div class="rh-l"><h1>${t} <span style="font-size:15px;color:var(--text2);font-weight:400">${profile?.name||''}</span></h1>
          <div class="price-row"><span class="pbig">$${price.toFixed(2)}</span><span class="pchg ${isPos?'pos':'neg'}">${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${chgP}%)</span></div>
        </div>
      </div>

      <div class="sec"><div class="stitle">交易策略</div>
        <div class="stgrid">
          <div class="stcard ag">
            <div class="sthdr"><span class="stnm" style="color:var(--red)">激進策略</span><span class="bbdg">BUY</span></div>
            <div class="stlb">入場區間</div><div class="stpr">$${eAL}–$${eAH}</div>
            <div class="stlb">止損</div><div class="stsp">$${sA}</div>
            <div class="trow"><span class="tl">T1</span><span class="tp">$${t1}</span><span class="tr">R:R ${rA1}:1</span></div>
            <div class="trow"><span class="tl">T2</span><span class="tp">$${t2}</span><span class="tr">R:R ${rA2}:1</span></div>
            <div class="trow"><span class="tl">T3</span><span class="tp">$${t3}</span><span class="tr">R:R ${rA3}:1</span></div>
          </div>
          <div class="stcard co">
            <div class="sthdr"><span class="stnm" style="color:var(--blue)">保守策略</span><span class="bbdg">BUY</span></div>
            <div class="stlb">入場區間</div><div class="stpr">$${eCL}–$${eCH}</div>
            <div class="stlb">止損</div><div class="stsp">$${sC}</div>
            <div class="trow"><span class="tl">T1</span><span class="tp">$${t1}</span><span class="tr">R:R ${rC1}:1</span></div>
            <div class="trow"><span class="tl">T2</span><span class="tp">$${t2}</span><span class="tr">R:R ${rC2}:1</span></div>
            <div class="trow"><span class="tl">T3</span><span class="tp">$${t3}</span><span class="tr">R:R ${rC3}:1</span></div>
          </div>
        </div>
      </div>

      <div class="riskbanner"><div class="risktitle">風險提示</div><div class="risktext">${riskText}</div></div>

      <div class="sumbanner">
        <div class="sumtitle">${sumTitle}</div>
        <div class="sumtext">${sumMap[grade]}</div>
        <div style="margin-top:.75rem;font-size:10px;color:var(--text3);font-family:var(--mono)">評分構成：技術 ×70% ｜ FINRA ×15% ｜ 情緒 ×15%</div>
      </div>
    </div>`;

  }catch(e){out.innerHTML=`<div class="error-msg">錯誤：${e.message}</div>`;}
  btn.disabled=false;
}
</script>
</body>
</html>
